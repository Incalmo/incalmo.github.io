<style>
  .status-wrapper {
    max-width: 760px;
    margin: 3rem auto;
    padding: 0 1rem;
  }
  .status-banner {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: #e8f5e9;
    border: 1px solid #c8e6c9;
    color: #1b5e20;
    padding: 1rem 1.25rem;
    border-radius: 8px;
    font-weight: 600;
    margin-bottom: 2rem;
  }
  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #2e7d32;
    box-shadow: 0 0 0 4px rgba(46,125,50,0.15);
  }
  .status-list {
    list-style: none;
    padding: 0;
    margin: 0;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    overflow: hidden;
  }
  .status-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid #e5e7eb;
    background: #fff;
  }
  .status-list li:last-child { border-bottom: none; }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: #2e7d32;
    font-weight: 500;
    font-size: 0.9rem;
  }
  .status-pill .status-dot { width: 8px; height: 8px; box-shadow: none; }
  .status-meta {
    color: #6b7280;
    font-size: 0.875rem;
    margin-top: 1.5rem;
  }
  .status-section-title {
    font-size: 1rem;
    font-weight: 600;
    color: #374151;
    margin: 2rem 0 0.75rem;
  }
  .incident-empty {
    color: #6b7280;
    background: #f9fafb;
    border: 1px dashed #e5e7eb;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    text-align: center;
  }
</style>

<div class="status-wrapper">
  <h1 class="mb-4">System Status</h1>

  <div class="status-banner">
    <span class="status-dot"></span>
    All systems operational
  </div>

  <ul class="status-list">
    <li>
      Website
      <span class="status-pill"><span class="status-dot"></span>Operational</span>
    </li>
  </ul>

  <div class="status-section-title">Active Incidents</div>
  <div class="incident-empty">No incidents reported.</div>

  <div class="status-section-title">Scheduled Maintenance</div>
  <div class="incident-empty">No scheduled maintenance.</div>

  <p class="status-meta">
    Last updated: <span id="status-updated"></span><br>
    For security incident reporting, contact <a href="mailto:security@incalmo.ai">security@incalmo.ai</a>.
  </p>
</div>

<script>
  document.getElementById('status-updated').textContent =
    new Date().toLocaleString(undefined, { dateStyle: 'long', timeStyle: 'short' });
</script>
